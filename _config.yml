title: "Joe Francis | Portfolio"
email: francisjoe238@gmail.com
description: "Electrical Engineering Student at KMITL"
url: "https://jo-francis.github.io"
baseurl: ""
github_username: joefrann
minimal_mistakes_skin: dark
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Author Settings
author:
  name    : "Joe Francis"
  avatar  : "/assets/images/bio-photo.jpg"
  bio     : "Electrical Engineering Student at KMITL | Freelance Instructor"
  location: "Bangkok, Thailand"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/joefrann"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/joefrann"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      
